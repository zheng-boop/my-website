<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇游戏</title>
    <style>
        /* 纯代码LOGO样式 */
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .snake-icon {
            width: 50px;
            height: 50px;
            background: #27ae60;
            border-radius: 10px;
            position: relative;
        }
        .snake-icon::before {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 10px;
            right: 10px;
        }
        .logo h1 {
            font-size: 32px;
            color: #2c3e50;
        }

        /* 游戏样式 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: Microsoft YaHei;
        }
        .score {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #333;
            background: white;
        }
    </style>
</head>

<body>
    <!-- 纯代码LOGO -->
    <div class="logo">
        <div class="snake-icon"></div>
        <h1>贪吃蛇大作战</h1>
    </div>

    <div class="score">得分：<span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');
        const grid = 20;
        let snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
        let dx = grid, dy = 0;
        let food = {};
        let score = 0;

        function randFood() {
            food = {
                x: Math.floor(Math.random()*20)*grid,
                y: Math.floor(Math.random()*20)*grid
            };
        }
        randFood();

        function draw() {
            ctx.fillStyle = "#fff";
            ctx.fillRect(0,0,400,400);

            ctx.fillStyle = "#f90";
            ctx.fillRect(food.x,food.y,grid-2,grid-2);

            for(let i=0;i<snake.length;i++){
                ctx.fillStyle = i===0 ? "#e74c3c":"#27ae60";
                ctx.fillRect(snake[i].x,snake[i].y,grid-2,grid-2);
            }
        }

        function move() {
            let head = {x:snake[0].x+dx, y:snake[0].y+dy};

            if(head.x<0||head.x>=400||head.y<0||head.y>=400){
                alert("游戏结束！得分："+score);
                snake=[{x:200,y:200},{x:180,y:200},{x:160,y:200}];
                dx=grid; dy=0; score=0; scoreText.innerText=0; randFood();
                return;
            }

            snake.unshift(head);

            if(head.x==food.x&&head.y==food.y){
                score+=10; scoreText.innerText=score; randFood();
            }else{
                snake.pop();
            }
        }

        document.onkeydown=function(e){
            if(e.keyCode==37&&dx!=grid) {dx=-grid; dy=0;}
            if(e.keyCode==38&&dy!=grid) {dx=0; dy=-grid;}
            if(e.keyCode==39&&dx!=-grid){dx=grid; dy=0;}
            if(e.keyCode==40&&dy!=-grid){dx=0; dy=grid;}
        };

        function loop(){draw();move();setTimeout(loop,150);}
        loop();
    </script>
</body>
</html>
